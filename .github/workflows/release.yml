name: Release

on:
  push:
    branches: [master]
    paths:
      - "portable/version.txt"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      skip: ${{ steps.v.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: v
        run: |
          VERSION=$(cat portable/version.txt | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if git tag -l "v$VERSION" | grep -q "v$VERSION"; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

  build-mac:
    needs: check-version
    if: needs.check-version.outputs.skip == 'false'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: false

      - name: Build UI
        working-directory: ui
        run: |
          pnpm install
          pnpm build
          mkdir -p ../portable/app/ui/dist
          cp -R dist/* ../portable/app/ui/dist/

      - name: Download Node.js runtimes
        run: |
          NODE_VER="v22.22.1"
          mkdir -p portable/app/runtime

          curl -fsSL "https://nodejs.org/dist/$NODE_VER/node-$NODE_VER-darwin-arm64.tar.xz" | tar -xJ
          mv "node-$NODE_VER-darwin-arm64" portable/app/runtime/node-darwin-arm64

          curl -fsSL "https://nodejs.org/dist/$NODE_VER/node-$NODE_VER-darwin-x64.tar.xz" | tar -xJ
          mv "node-$NODE_VER-darwin-x64" portable/app/runtime/node-darwin-x64

      - name: Install OpenClaw
        run: |
          mkdir -p portable/app/core
          cd portable/app/core
          npm init -y
          npm install openclaw

      - name: Build Mac launchers
        working-directory: launcher
        run: |
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" \
            -o "../portable/启动 PocketClaw.app/Contents/MacOS/PocketClaw-arm64" .
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" \
            -o "../portable/启动 PocketClaw.app/Contents/MacOS/PocketClaw-x64" .

          chmod +x "../portable/启动 PocketClaw.app/Contents/MacOS/launcher"
          chmod +x "../portable/启动 PocketClaw.app/Contents/MacOS/PocketClaw-arm64"
          chmod +x "../portable/启动 PocketClaw.app/Contents/MacOS/PocketClaw-x64"

      - name: Create Mac package
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          rm -f "portable/启动 PocketClaw.exe" 2>/dev/null || true
          rm -f portable/Windows-Start.bat portable/Windows-Menu.bat 2>/dev/null || true
          rm -f portable/Mac-Start.command portable/Mac-Menu.command 2>/dev/null || true

          cd portable
          zip -r "../PocketClaw-v${VERSION}-mac.zip" . \
            -x "data/.openclaw/credentials/*" \
            -x "data/memory/*.md" \
            -x "data/backups/*"

      - name: Create update package
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          cd portable
          zip -r "../PocketClaw-v${VERSION}-update.zip" \
            app/ui/ system/ version.txt

      - uses: actions/upload-artifact@v4
        with:
          name: release-mac
          path: PocketClaw-*.zip

  build-windows:
    needs: check-version
    if: needs.check-version.outputs.skip == 'false'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: false

      - name: Build UI
        shell: bash
        working-directory: ui
        run: |
          pnpm install
          pnpm build
          mkdir -p ../portable/app/ui/dist
          cp -R dist/* ../portable/app/ui/dist/

      - name: Download Node.js runtime
        shell: bash
        run: |
          NODE_VER="v22.22.1"
          mkdir -p portable/app/runtime
          curl -fsSL "https://nodejs.org/dist/$NODE_VER/node-$NODE_VER-win-x64.zip" -o node-win.zip
          unzip -q node-win.zip
          mv "node-$NODE_VER-win-x64" portable/app/runtime/node-win-x64

      - name: Install OpenClaw
        shell: bash
        run: |
          mkdir -p portable/app/core
          cd portable/app/core
          npm init -y
          npm install openclaw

      - name: Build Windows launcher
        shell: bash
        working-directory: launcher
        run: |
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" \
            -o "../portable/启动 PocketClaw.exe" .

      - name: Create Windows package
        shell: bash
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          rm -rf "portable/启动 PocketClaw.app" 2>/dev/null || true
          rm -f portable/Mac-Start.command portable/Mac-Menu.command 2>/dev/null || true
          rm -f portable/Windows-Start.bat portable/Windows-Menu.bat 2>/dev/null || true
          cd portable
          7z a -r "../PocketClaw-v${VERSION}-windows.zip" . \
            -x!data/.openclaw/credentials \
            -x!data/memory/*.md \
            -x!data/backups/*

      - uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: PocketClaw-*.zip

  release:
    needs: [check-version, build-mac, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List packages
        run: ls -lh PocketClaw-*.zip

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v${{ needs.check-version.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"

          gh release create "$VERSION" \
            --title "PocketClaw $VERSION" \
            --generate-notes \
            PocketClaw-*.zip
