name: Release

on:
  push:
    branches: [master]
    paths:
      - "portable/version.txt"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      skip: ${{ steps.v.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: v
        run: |
          VERSION=$(cat portable/version.txt | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if git tag -l "v$VERSION" | grep -q "v$VERSION"; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

  build-mac:
    needs: check-version
    if: needs.check-version.outputs.skip == 'false'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: false

      - name: Build UI
        working-directory: ui
        run: |
          pnpm install
          pnpm build
          mkdir -p ../portable/app/ui/dist
          cp -R dist/* ../portable/app/ui/dist/

      - name: Download Node.js runtimes
        run: |
          NODE_VER="v22.22.1"
          mkdir -p portable/app/runtime

          # Download SHASUMS for verification
          curl -fsSL "https://nodejs.org/dist/$NODE_VER/SHASUMS256.txt" -o SHASUMS256.txt

          # Download with original filenames (shasum -c matches by filename)
          curl -fsSL "https://nodejs.org/dist/$NODE_VER/node-$NODE_VER-darwin-arm64.tar.xz" \
            -o "node-$NODE_VER-darwin-arm64.tar.xz"
          grep "node-$NODE_VER-darwin-arm64.tar.xz" SHASUMS256.txt | shasum -a 256 -c -
          tar -xJf "node-$NODE_VER-darwin-arm64.tar.xz"
          mv "node-$NODE_VER-darwin-arm64" portable/app/runtime/node-darwin-arm64

          curl -fsSL "https://nodejs.org/dist/$NODE_VER/node-$NODE_VER-darwin-x64.tar.xz" \
            -o "node-$NODE_VER-darwin-x64.tar.xz"
          grep "node-$NODE_VER-darwin-x64.tar.xz" SHASUMS256.txt | shasum -a 256 -c -
          tar -xJf "node-$NODE_VER-darwin-x64.tar.xz"
          mv "node-$NODE_VER-darwin-x64" portable/app/runtime/node-darwin-x64

          rm -f node-$NODE_VER-darwin-*.tar.xz SHASUMS256.txt

      - name: Install OpenClaw
        run: |
          mkdir -p portable/app/core
          cd portable/app/core
          npm init -y
          npm install openclaw@2026.3.22

      - name: Build OpenClaw Control UI
        run: |
          OPENCLAW_PKG="portable/app/core/node_modules/openclaw"
          OPENCLAW_VER=$(node -e "console.log(require('./${OPENCLAW_PKG}/package.json').version)")
          echo "Building Control UI for OpenClaw v${OPENCLAW_VER}..."

          # Clone matching OpenClaw source to build the Lit-based Control UI
          git clone --depth 1 --branch "v${OPENCLAW_VER}" \
            https://github.com/openclaw/openclaw.git /tmp/openclaw-src || \
          git clone --depth 1 https://github.com/openclaw/openclaw.git /tmp/openclaw-src

          cd /tmp/openclaw-src
          pnpm install --frozen-lockfile || pnpm install
          node scripts/ui.js build || pnpm ui:build || true

          # Verify build output exists before copying
          if [ -f "dist/control-ui/index.html" ]; then
            mkdir -p "${GITHUB_WORKSPACE}/portable/dist/control-ui"
            cp -R dist/control-ui/* "${GITHUB_WORKSPACE}/portable/dist/control-ui/"
            echo "Control UI built: $(ls "${GITHUB_WORKSPACE}/portable/dist/control-ui/" | wc -l) files"
          else
            echo "WARNING: Control UI build did not produce dist/control-ui/index.html"
            echo "         Port 18789 will show 'assets not found'. This is non-fatal."
            ls dist/ 2>/dev/null || echo "         dist/ directory does not exist"
          fi

      - name: Install channel plugins
        run: |
          # Plugins MUST be installed alongside openclaw (same node_modules/) so they
          # can resolve openclaw/plugin-sdk.
          # Feishu is BUNDLED in OpenClaw 3.22+ — do NOT install it.
          cd portable/app/core
          npm install @tencent-connect/openclaw-qqbot@latest @tencent-weixin/openclaw-weixin@latest 2>&1 || \
            echo "WARN: Channel plugin installation failed"
          echo "Installed channel plugins:"
          ls node_modules/@tencent-connect/ 2>/dev/null || true
          ls node_modules/@tencent-weixin/ 2>/dev/null || true
          # Fix host version: npm init -y creates version "1.0.0" which makes
          # openclaw-weixin think the host is v1.0.0 instead of v2026.3.22.
          # Plugins walk up to nearest package.json to resolve host version.
          OPENCLAW_VER=$(node -e "console.log(require('./node_modules/openclaw/package.json').version)")
          node -e "const p=require('./package.json'); p.version='${OPENCLAW_VER}'; require('fs').writeFileSync('package.json',JSON.stringify(p,null,2))"
          echo "app/core/package.json version set to ${OPENCLAW_VER}"
          # Clean up stale plugins from OPENCLAW_HOME
          rm -rf "${GITHUB_WORKSPACE}/portable/data/.openclaw/node_modules" 2>/dev/null || true

      - name: Pre-install ClawHub skills
        run: |
          WORKSPACE_DIR="${GITHUB_WORKSPACE}/portable/data/.openclaw/workspace"
          mkdir -p "$WORKSPACE_DIR/skills"
          # Install clawhub ONCE globally (npx @latest re-downloads every iteration = 30min+)
          npm install -g clawhub@latest
          # clawhub uses --workdir (NOT $OPENCLAW_HOME). Skills go to <workdir>/skills/<slug>/
          installed=0
          failed=0
          while IFS= read -r slug; do
            [ -z "$slug" ] && continue
            if clawhub install "$slug" --workdir "$WORKSPACE_DIR" 2>/dev/null || \
               { sleep 3 && clawhub install "$slug" --workdir "$WORKSPACE_DIR" 2>/dev/null; }; then
              installed=$((installed + 1))
            else
              echo "WARN: Failed to install $slug"
              failed=$((failed + 1))
            fi
          done < portable/system/bundled-skills.txt
          actual=$(ls "$WORKSPACE_DIR/skills" 2>/dev/null | wc -l | tr -d ' ')
          echo "Skills: ${installed} installed, ${failed} failed, ${actual} on disk"

      - name: Build Mac launchers
        working-directory: launcher
        run: |
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" \
            -o "../portable/system/启动PocketClaw.app/Contents/MacOS/PocketClaw-arm64" .
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" \
            -o "../portable/system/启动PocketClaw.app/Contents/MacOS/PocketClaw-x64" .

          chmod +x "../portable/system/启动PocketClaw.app/Contents/MacOS/launcher"
          chmod +x "../portable/system/启动PocketClaw.app/Contents/MacOS/PocketClaw-arm64"
          chmod +x "../portable/system/启动PocketClaw.app/Contents/MacOS/PocketClaw-x64"

      - name: Sign Mac app (ad-hoc)
        run: |
          codesign --force --deep --sign - "portable/system/启动PocketClaw.app"

      - name: Create Mac package
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          # Remove Windows-only files
          rm -f "portable/启动PocketClaw.exe" 2>/dev/null || true
          rm -f "portable/启动PocketClaw.bat" 2>/dev/null || true
          rm -f portable/查看日志.bat 2>/dev/null || true
          # Remove legacy launchers
          rm -f portable/Windows-Start.bat portable/Windows-Menu.bat 2>/dev/null || true
          rm -f portable/Mac-Start.command portable/Mac-Menu.command 2>/dev/null || true

          chmod +x portable/启动PocketClaw.command

          cd portable
          zip -r "../PocketClaw-v${VERSION}-mac.zip" . \
            -x "data/.openclaw/credentials/*" \
            -x "data/memory/*.md" \
            -x "data/backups/*" \
            -x "system/setup.bat"

      - uses: actions/upload-artifact@v4
        with:
          name: release-mac
          path: PocketClaw-*.zip

  build-windows:
    needs: check-version
    if: needs.check-version.outputs.skip == 'false'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: false

      - name: Build UI
        shell: bash
        working-directory: ui
        run: |
          pnpm install
          pnpm build
          mkdir -p ../portable/app/ui/dist
          cp -R dist/* ../portable/app/ui/dist/

      - name: Download Node.js runtime
        shell: bash
        run: |
          NODE_VER="v22.22.1"
          NODE_SHA256="877cb93829e14fffbbc7903e7d8037336c9a79f3ea43c5d0b8c2379b79da56de"
          mkdir -p portable/app/runtime
          curl -fsSL "https://nodejs.org/dist/$NODE_VER/node-$NODE_VER-win-x64.zip" -o node-win.zip
          echo "$NODE_SHA256  node-win.zip" | sha256sum -c -
          unzip -q node-win.zip
          mv "node-$NODE_VER-win-x64" portable/app/runtime/node-win-x64
          rm -f node-win.zip

      - name: Install OpenClaw
        shell: bash
        run: |
          mkdir -p portable/app/core
          cd portable/app/core
          npm init -y
          npm install openclaw@2026.3.22

      - name: Build OpenClaw Control UI
        shell: bash
        run: |
          OPENCLAW_PKG="portable/app/core/node_modules/openclaw"
          OPENCLAW_VER=$(node -e "console.log(require('./${OPENCLAW_PKG}/package.json').version)")
          echo "Building Control UI for OpenClaw v${OPENCLAW_VER}..."

          git clone --depth 1 --branch "v${OPENCLAW_VER}" \
            https://github.com/openclaw/openclaw.git /tmp/openclaw-src || \
          git clone --depth 1 https://github.com/openclaw/openclaw.git /tmp/openclaw-src

          cd /tmp/openclaw-src
          pnpm install --frozen-lockfile || pnpm install
          node scripts/ui.js build || pnpm ui:build || true

          if [ -f "dist/control-ui/index.html" ]; then
            mkdir -p "${GITHUB_WORKSPACE}/portable/dist/control-ui"
            cp -R dist/control-ui/* "${GITHUB_WORKSPACE}/portable/dist/control-ui/"
            echo "Control UI built: $(ls "${GITHUB_WORKSPACE}/portable/dist/control-ui/" | wc -l) files"
          else
            echo "WARNING: Control UI build did not produce dist/control-ui/index.html"
            echo "         Port 18789 will show 'assets not found'. This is non-fatal."
            ls dist/ 2>/dev/null || echo "         dist/ directory does not exist"
          fi

      - name: Install channel plugins
        shell: bash
        run: |
          # Plugins MUST be in same node_modules/ as openclaw for plugin-sdk resolution.
          cd "${GITHUB_WORKSPACE}/portable/app/core"
          npm install @tencent-connect/openclaw-qqbot@latest @tencent-weixin/openclaw-weixin@latest 2>&1 || \
            echo "WARN: Channel plugin installation failed"
          echo "Installed channel plugins:"
          ls node_modules/@tencent-connect/ 2>/dev/null || true
          ls node_modules/@tencent-weixin/ 2>/dev/null || true
          # Fix host version (same as Mac build)
          OPENCLAW_VER=$(node -e "console.log(require('./node_modules/openclaw/package.json').version)")
          node -e "const p=require('./package.json'); p.version='${OPENCLAW_VER}'; require('fs').writeFileSync('package.json',JSON.stringify(p,null,2))"
          echo "app/core/package.json version set to ${OPENCLAW_VER}"
          rm -rf "${GITHUB_WORKSPACE}/portable/data/.openclaw/node_modules" 2>/dev/null || true

      - name: Pre-install ClawHub skills
        shell: bash
        run: |
          WORKSPACE_DIR="${GITHUB_WORKSPACE}/portable/data/.openclaw/workspace"
          mkdir -p "$WORKSPACE_DIR/skills"
          npm install -g clawhub@latest
          installed=0
          failed=0
          while IFS= read -r slug; do
            [ -z "$slug" ] && continue
            if clawhub install "$slug" --workdir "$WORKSPACE_DIR" 2>/dev/null || \
               { sleep 3 && clawhub install "$slug" --workdir "$WORKSPACE_DIR" 2>/dev/null; }; then
              installed=$((installed + 1))
            else
              echo "WARN: Failed to install $slug"
              failed=$((failed + 1))
            fi
          done < portable/system/bundled-skills.txt
          actual=$(ls "$WORKSPACE_DIR/skills" 2>/dev/null | wc -l | tr -d ' ')
          echo "Skills: ${installed} installed, ${failed} failed, ${actual} on disk"

      - name: Build Windows launcher
        shell: bash
        working-directory: launcher
        run: |
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" \
            -o "../portable/system/启动PocketClaw.exe" .

      - name: Create Windows package
        shell: bash
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          # Remove Mac-only files
          rm -rf "portable/system/启动PocketClaw.app" 2>/dev/null || true
          rm -f portable/启动PocketClaw.command 2>/dev/null || true
          # Remove legacy launchers
          rm -f portable/Mac-Start.command portable/Mac-Menu.command 2>/dev/null || true
          rm -f portable/Windows-Start.bat portable/Windows-Menu.bat 2>/dev/null || true

          cd portable
          7z a -r "../PocketClaw-v${VERSION}-windows.zip" . \
            -x!data/.openclaw/credentials \
            -x!data/memory/*.md \
            -x!data/backups/* \
            -x!system/setup.sh

      - uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: PocketClaw-*.zip

  release:
    needs: [check-version, build-mac, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums
        run: |
          sha256sum PocketClaw-*.zip > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v${{ needs.check-version.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"

          gh release create "$VERSION" \
            --title "OpenClawU盘便携版 $VERSION" \
            --generate-notes \
            PocketClaw-*.zip SHA256SUMS.txt

      - name: Upload to Aliyun OSS (China mirror)
        continue-on-error: true
        env:
          OSS_KEY_ID: ${{ secrets.ALIYUN_OSS_KEY_ID }}
          OSS_KEY_SECRET: ${{ secrets.ALIYUN_OSS_KEY_SECRET }}
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          BUCKET="pocketclawaus"
          ENDPOINT="oss-cn-shanghai.aliyuncs.com"

          # Install ossutil v1 — script needs sudo for /usr/bin, or use local path
          curl -fsSL "https://gosspublic.alicdn.com/ossutil/install.sh" | sudo bash || {
            # Fallback: download and use from local path
            curl -fsSL "https://gosspublic.alicdn.com/ossutil/1.7.21/ossutil-v1.7.21-linux-amd64.zip" -o /tmp/ossutil.zip
            unzip -qo /tmp/ossutil.zip -d /tmp/ossutil
            chmod +x /tmp/ossutil/ossutil-v1.7.21-linux-amd64/ossutil64
            export PATH="/tmp/ossutil/ossutil-v1.7.21-linux-amd64:$PATH"
          }
          OSSUTIL=$(command -v ossutil64 || command -v ossutil || echo "")
          if [ -z "$OSSUTIL" ]; then
            echo "ERROR: ossutil not found after install"
            exit 1
          fi
          echo "Using: $OSSUTIL"
          "$OSSUTIL" --version

          # Configure
          "$OSSUTIL" config \
            -e "${ENDPOINT}" \
            -i "${OSS_KEY_ID}" \
            -k "${OSS_KEY_SECRET}"

          # Upload each file
          for file in PocketClaw-*.zip SHA256SUMS.txt; do
            SIZE=$(du -h "$file" | cut -f1)
            echo "Uploading $file (${SIZE}) to oss://${BUCKET}/v${VERSION}/${file}..."
            "$OSSUTIL" cp "$file" "oss://${BUCKET}/v${VERSION}/${file}" -f
          done

          echo "OSS upload complete. Verifying:"
          "$OSSUTIL" ls "oss://${BUCKET}/v${VERSION}/"

