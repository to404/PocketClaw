name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: false

      - name: Install UI dependencies
        working-directory: ui
        run: pnpm install

      - name: Lint
        working-directory: ui
        run: pnpm lint

      - name: Format check
        working-directory: ui
        run: pnpm format

      - name: Type check
        working-directory: ui
        run: pnpm typecheck

      - name: Test
        working-directory: ui
        run: pnpm test

      - name: Build UI
        working-directory: ui
        run: pnpm build

      - name: Build launchers
        working-directory: launcher
        run: |
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o "../portable/启动PocketClaw.exe" .
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o "../portable/PocketClaw-arm64" .
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o "../portable/PocketClaw-x64" .
